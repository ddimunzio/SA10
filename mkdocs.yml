site_name: Ham Radio Contest Manager
site_description: A configurable ham radio contest scoring system. Ships with SA10M rules; adaptable to any contest via YAML configuration.
site_author: LW5HR - Diego
copyright: >-
  Developed by <strong>LW5HR - Diego</strong> &mdash; Freely available to the amateur radio community.
  Use it, adapt it, share it. 73 de LW5HR.
site_url: https://ddimunzio.github.io/SA10

repo_name: SA10
repo_url: https://github.com/ddimunzio/SA10

theme:
  name: material
  palette:
    - scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github


markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

plugins:
  - search:
      lang:
        - en
        - es

extra:
  generator: false
  alternate:
    - name: English
      link: /SA10/
      lang: en
    - name: Español
      link: /SA10/es/
      lang: es
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ddimunzio/SA10

nav:
