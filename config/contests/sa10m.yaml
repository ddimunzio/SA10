contest:
  name: South America 10m Contest
  slug: sa10m
  description: SA10M Contest
  website: http://sa10m.com.ar
  bands: ["10m"]
  modes: [CW, SSB]
  duration_hours: 24

categories:
  - name: Single Operator
    code: SINGLE-OP
  - name: Multi Operator
    code: MULTI-OP

exchange:
  sent:
    - field: rst
      type: rst
    - field: cq_zone
      type: zone
  received:
    - field: rst
      type: rst
    - field: cq_zone
      type: zone

scoring:
  points:
    # Own DXCC entity: 0 points
    - description: Own DXCC entity
      value: 0
      conditions:
        - type: same_dxcc

    # Mobile in Zone 9-13 (SA) -> SA: 2 points
    - description: Mobile in Zone 9-13 (SA) -> SA
      value: 2
      conditions:
        - type: callsign_suffix
          values: [/M, /AM, /MM]
        - type: operator_zone
          values: [9, 10, 11, 12, 13]
        - type: contact_continent
          value: SA

    # Mobile in Zone 9-13 (SA) -> Non-SA: 4 points
    - description: Mobile in Zone 9-13 (SA) -> Non-SA
      value: 4
      conditions:
        - type: callsign_suffix
          values: [/M, /AM, /MM]
        - type: operator_zone
          values: [9, 10, 11, 12, 13]
        - type: contact_continent
          value: "!SA"

    # Mobile outside Zone 9-13 -> SA: 4 points
    - description: Mobile outside Zone 9-13 -> SA
      value: 4
      conditions:
        - type: callsign_suffix
          values: [/M, /AM, /MM]
        - type: operator_zone
          value: "!9,10,11,12,13"
        - type: contact_continent
          value: SA

    # Mobile outside Zone 9-13 -> Non-SA: 2 points
    - description: Mobile outside Zone 9-13 -> Non-SA
      value: 2
      conditions:
        - type: callsign_suffix
          values: [/M, /AM, /MM]
        - type: operator_zone
          value: "!9,10,11,12,13"
        - type: contact_continent
          value: "!SA"

    # SA -> SA: 2 points
    - description: SA -> SA
      value: 2
      conditions:
        - type: operator_continent
          value: SA
        - type: contact_continent
          value: SA

    # SA -> Non-SA: 4 points
    - description: SA -> Non-SA
      value: 4
      conditions:
        - type: operator_continent
          value: SA
        - type: contact_continent
          value: "!SA"

    # Non-SA -> SA: 4 points
    - description: Non-SA -> SA
      value: 4
      conditions:
        - type: operator_continent
          value: "!SA"
        - type: contact_continent
          value: SA

    # Non-SA -> Non-SA: 2 points
    - description: Non-SA -> Non-SA
      value: 2
      conditions:
        - type: operator_continent
          value: "!SA"
        - type: contact_continent
          value: "!SA"

  multipliers:
    - type: wpx_prefix
      scope: per_band_mode
      description: WPX Prefix per mode
    - type: cq_zone
      scope: per_band_mode
      description: CQ Zone per mode

  final_score:
    formula: SUM_OF_MODE_SCORES

validation:
  duplicate_window:
    type: band_mode
